services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_KEY: ${API_KEY:-dev-api-key}
    ports:
      - "5173:5173"
    depends_on:
      - backend
